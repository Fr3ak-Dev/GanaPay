services:
  # ==================== API ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ganapay-api
    ports:
      - "5057:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=GanaPayDB;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
      - MongoDbSettings__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDbSettings__DatabaseName=${MONGO_DATABASE_NAME}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - JwtSettings__ExpirationInMinutes=${JWT_EXPIRATION_MINUTES}
    depends_on:
      - sqlserver
      - mongodb
    networks:
      - ganapay-network

  # ==================== SQL SERVER ====================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ganapay-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - ganapay-network

  # ==================== MONGODB ====================
  mongodb:
    image: mongo:7.0
    container_name: ganapay-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - ganapay-network

# ==================== VOLUMES ====================
volumes:
  sqlserver-data:
    driver: local
  mongodb-data:
    driver: local

# ==================== NETWORKS ====================
networks:
  ganapay-network:
    driver: bridge